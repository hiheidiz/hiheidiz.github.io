<div class="panel-inner scioly-inner">
  <div class="scioly-timeline">
    <div class="scioly-timeline-line"></div>
    <div class="scioly-timeline-dots">
      <div class="scioly-dot" style="--dot-color: #FFB3B3" data-scioly="1"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="1"><span>1</span></div></div>
      <div class="scioly-dot" style="--dot-color: #FFCCB3" data-scioly="2"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="2"><span>2</span></div></div>
      <div class="scioly-dot" style="--dot-color: #FFE0B3" data-scioly="3"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="3"><span>3</span></div></div>
      <div class="scioly-dot" style="--dot-color: #FFFFB3" data-scioly="4"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="4"><span>4</span></div></div>
      <div class="scioly-dot" style="--dot-color: #D4FFB3" data-scioly="5"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="5"><span>5</span></div></div>
      <div class="scioly-dot" style="--dot-color: #B3FFD4" data-scioly="6"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="6"><span>6</span></div></div>
      <div class="scioly-dot" style="--dot-color: #B3FFFF" data-scioly="7"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="7"><span>7</span></div></div>
      <div class="scioly-dot" style="--dot-color: #B3D4FF" data-scioly="8"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="8"><span>8</span></div></div>
      <div class="scioly-dot" style="--dot-color: #CCB3FF" data-scioly="9"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="9"><span>9</span></div></div>
      <div class="scioly-dot" style="--dot-color: #FFB3E6" data-scioly="10"><div class="scioly-star">✦</div><div class="scioly-drop-target" data-drop="10"><span>10</span></div></div>
    </div>
  </div>

  <div class="scioly-content-area">
    <div class="scioly-box" data-scioly-box="1" style="--box-color: #FFB3B3"></div>
    <div class="scioly-box" data-scioly-box="2" style="--box-color: #FFCCB3"></div>
    <div class="scioly-box" data-scioly-box="3" style="--box-color: #FFE0B3"></div>
    <div class="scioly-box" data-scioly-box="4" style="--box-color: #FFFFB3"></div>
    <div class="scioly-box" data-scioly-box="5" style="--box-color: #D4FFB3"></div>
    <div class="scioly-box" data-scioly-box="6" style="--box-color: #B3FFD4"></div>
    <div class="scioly-box" data-scioly-box="7" style="--box-color: #B3FFFF"></div>
    <div class="scioly-box" data-scioly-box="8" style="--box-color: #B3D4FF"></div>
    <div class="scioly-box" data-scioly-box="9" style="--box-color: #CCB3FF"></div>
    <div class="scioly-box" data-scioly-box="10" style="--box-color: #FFB3E6"></div>
  </div>

  <div class="scioly-bottom-bar">
    <div class="scioly-minerals">
      <div class="scioly-mineral" data-mineral="a">A</div>
      <div class="scioly-mineral" data-mineral="b">B</div>
      <div class="scioly-mineral" data-mineral="c">C</div>
      <div class="scioly-mineral" data-mineral="d">D</div>
      <div class="scioly-mineral" data-mineral="e">E</div>
      <div class="scioly-mineral" data-mineral="f">F</div>
      <div class="scioly-mineral" data-mineral="g">G</div>
      <div class="scioly-mineral" data-mineral="h">H</div>
      <div class="scioly-mineral" data-mineral="i">I</div>
      <div class="scioly-mineral" data-mineral="j">J</div>
    </div>
  </div>
  <div class="panel-help-row">
    <div class="panel-help-wrap">
      <button class="info-help-btn" type="button" aria-label="How to use SciOly timeline">
        <span class="info-help-icon">ℹ</span>
      </button>
      <div class="info-help-tooltip" role="note">
        Click on the stars to learn more about my SciOly journey! Also, try sorting the minerals by order of hardness :D 
      </div>
    </div>
  </div>
</div>
