<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>helloitsheidi!</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./stars-bg.js"></script>
    <script defer src="./art/art.js"></script>
    <script defer src="./script.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="panels" aria-live="polite">
        <section
          id="home"
          class="panel is-active"
          role="tabpanel"
          aria-labelledby="tab-home"
          data-include-html="home/section.html"
        ></section>

        <section
          id="art"
          class="panel art-panel"
          role="tabpanel"
          aria-labelledby="tab-art"
          data-include-html="art/section.html"
        ></section>

        <section
          id="music"
          class="panel"
          role="tabpanel"
          aria-labelledby="tab-music"
          data-include-html="music/section.html"
        ></section>

        <section
          id="writing"
          class="panel"
          role="tabpanel"
          aria-labelledby="tab-writing"
          data-include-html="writing/section.html"
        ></section>

        <section
          id="scioly"
          class="panel"
          role="tabpanel"
          aria-labelledby="tab-scioly"
          data-include-html="scioly/section.html"
        ></section>

        <section
          id="school"
          class="panel"
          role="tabpanel"
          aria-labelledby="tab-school"
          data-include-html="school/section.html"
        ></section>
      </main>

      <nav class="top-nav" aria-label="Section tabs">
        <div class="top-nav-scroller" role="tablist" aria-orientation="horizontal">
          <div class="top-nav-left" role="presentation">
            <button
              id="tab-home"
              class="tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="home"
              data-target="home"
            >
              <span class="nav-brand">Heidi Zhang</span>
            </button>
          </div>

          <div class="top-nav-right" role="presentation">
            <button
              id="tab-art"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="art"
              data-target="art"
            >
              Art/Design
            </button>

            <button
              id="tab-music"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="music"
              data-target="music"
            >
              Music
            </button>

            <button
              id="tab-writing"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="writing"
              data-target="writing"
            >
              Writing
            </button>

            <button
              id="tab-scioly"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="scioly"
              data-target="scioly"
            >
              SciOly
            </button>

            <button
              id="tab-school"
              class="tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="school"
              data-target="school"
            >
              School
            </button>

            <button
              id="stars-toggle"
              class="stars-toggle"
              type="button"
              aria-pressed="true"
              aria-label="Disable stars background"
            >
              ✧
            </button>
          </div>
        </div>
      </nav>

      <!-- Art modal (lives outside panels so z-index/clicks are never blocked) -->
      <div id="art-modal-overlay" class="art-modal" aria-hidden="true">
        <div class="art-modal-backdrop"></div>
        <div class="art-modal-dialog" role="dialog" aria-modal="true" aria-label="Art item">
          <div class="art-modal-content">
            <!-- Blank for now -->
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
